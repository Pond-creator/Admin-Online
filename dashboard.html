<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👜</text></svg>">
  <title>Admin Online — รายการโน๊ต</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="app-header">
  <span class="brand"><span class="icon">📝</span>Admin Online</span>
  <nav>
    <a href="form.html">➕ สร้างโน๊ต</a>
    <a href="dashboard.html" class="active">📋 รายการโน๊ต</a>
    <a href="issued.html">📄 ใบกำกับที่ออกแล้ว</a>
  </nav>
  <span class="spacer"></span>
  <button class="btn btn-primary btn-sm" onclick="location.reload()">🔄 รีเฟรช</button>
  <span class="spacer"></span>
  <span class="user-box" id="user-box"></span>
  <button class="btn btn-secondary btn-sm" onclick="Auth.logout()">ออกจากระบบ</button>
</header>

<div class="container" style="max-width:1100px">
  <div class="filters">
    <div class="form-group">
      <label class="form-label">ประเภท</label>
      <select id="f-type" class="form-control"><option value="">ทั้งหมด</option></select>
    </div>
    <div class="form-group">
      <label class="form-label">ร้านค้า</label>
      <select id="f-store" class="form-control"><option value="">ทั้งหมด</option></select>
    </div>
    <div class="form-group">
      <label class="form-label">ช่องทาง</label>
      <select id="f-channel" class="form-control"><option value="">ทั้งหมด</option></select>
    </div>
    <div class="form-group">
      <label class="form-label">จากวันที่</label>
      <input id="f-from" class="form-control" placeholder="วว/ดด/ปปปป" style="max-width:150px">
    </div>
    <div class="form-group">
      <label class="form-label">ถึงวันที่</label>
      <input id="f-to" class="form-control" placeholder="วว/ดด/ปปปป" style="max-width:150px">
    </div>
    <div class="form-group" style="flex:1;min-width:200px">
      <label class="form-label">ค้นหา (ชื่อลูกค้า / เลขคำสั่งซื้อ / หมายเหตุ)</label>
      <input id="f-q" class="form-control" placeholder="พิมพ์เพื่อค้นหา (เด้งทันที)...">
    </div>
    <button class="btn btn-success" id="btn-deadline" title="เรียงใบกำกับตามวันที่ลูกค้าต้องการใช้ (ใกล้สุดก่อน)">🗓️ เรียง Deadline</button>
    <button class="btn btn-secondary" id="btn-clear">ล้างตัวกรอง</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>วันที่โน๊ต</th><th>ประเภท</th><th>ร้าน</th><th>ช่องทาง</th>
          <th>เลขคำสั่งซื้อ</th><th style="text-align:right">ยอด</th><th>ผู้บันทึก</th><th></th>
        </tr>
      </thead>
      <tbody id="rows"><tr><td colspan="8" style="text-align:center;color:var(--text-muted);padding:30px">กำลังโหลด...</td></tr></tbody>
    </table>
  </div>
  <div id="dash-pager" style="margin-top:14px"></div>
</div>

<div id="modal-root"></div>
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/th.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/recent.js"></script>
<script src="js/users.js"></script>
</body>
</html>
