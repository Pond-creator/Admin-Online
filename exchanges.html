<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👜</text></svg>">
  <title>Admin Online — รายงานเปลี่ยนสินค้า</title>
  <link rel="stylesheet" href="lib/flatpickr.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="app-header">
  <span class="brand"><span class="icon">📝</span>Admin Online</span>
  <nav>
    <a href="form.html">➕ สร้างโน๊ต</a>
    <a href="dashboard.html">📋 รายการโน๊ต</a>
    <a href="sales.html">💰 รายงานขาย</a>
    <a href="issued.html">📄 ใบกำกับที่ออกแล้ว</a>
    <a href="cancels.html">🚫 รายงานยกเลิก</a>
    <a href="exchanges.html" class="active">🔄 รายงานเปลี่ยนสินค้า</a>
  </nav>
  <span class="spacer"></span>
  <button class="btn btn-primary btn-sm" onclick="location.reload()">🔄 รีเฟรช</button>
  <span class="spacer"></span>
  <span class="user-box" id="user-box"></span>
  <button class="btn btn-secondary btn-sm" onclick="Auth.logout()">ออกจากระบบ</button>
</header>

<div class="container" style="max-width:1100px">
  <h2 style="margin-bottom:16px;color:var(--info)">🔄 รายงานเปลี่ยนสินค้า <span id="rp-count" style="font-size:15px;color:var(--text-muted)">0</span> รายการ</h2>
  <div class="filters">
    <div class="form-group">
      <label class="form-label">ร้านค้า</label>
      <select id="rp-store" class="form-control"><option value="">ทั้งหมด</option></select>
    </div>
    <div class="form-group">
      <label class="form-label">จากวันที่</label>
      <input id="rp-from" class="form-control" placeholder="วว/ดด/ปปปป" style="max-width:150px">
    </div>
    <div class="form-group">
      <label class="form-label">ถึงวันที่</label>
      <input id="rp-to" class="form-control" placeholder="วว/ดด/ปปปป" style="max-width:150px">
    </div>
    <div class="form-group" style="flex:1;min-width:200px">
      <label class="form-label">ค้นหา (เลขคำสั่งซื้อ / ลูกค้า / หมายเหตุ)</label>
      <input id="rp-q" class="form-control" placeholder="พิมพ์เพื่อค้นหา...">
    </div>
    <button class="btn btn-success" id="rp-export">⬇️ Export Excel</button>
  </div>

  <div class="table-wrapper">
    <table>
      <thead><tr>
        <th>วันที่โน๊ต</th><th>ร้าน</th><th>ช่องทาง</th><th>เลขคำสั่งซื้อ</th><th>ค่าเปลี่ยน</th><th></th>
      </tr></thead>
      <tbody id="rp-rows"><tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:30px">กำลังโหลด...</td></tr></tbody>
    </table>
  </div>
</div>

<div id="modal-root"></div>
<div id="toast-container"></div>

<script>const REPORT_TYPE = 'exchange';</script>
<script src="lib/flatpickr.min.js"></script>
<script src="lib/flatpickr-th.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/report.js"></script>
<script src="js/users.js"></script>
</body>
</html>
